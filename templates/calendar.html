{% extends "base.html" %}
{% block head %}
<!-- FULLCALENDAR -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">

<style>
    #calendar {
        max-width: 1100px;
        margin: 20px auto;
        background: white;
        padding: 15px;
        border-radius: 14px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    .fc-toolbar-title {
        font-size: 1.6rem;
        font-weight: 600;
    }

    .fc-event {
        border-radius: 8px !important;
        padding-left: 5px;
        cursor: pointer;
    }

    .fc-daygrid-day-number {
        font-weight: bold;
    }
</style>
{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="fa-solid fa-calendar-days"></i> Agenda</h1>

<div id="calendar"></div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const calendarEl = document.getElementById("calendar");

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        height: "auto",
        selectable: true,
        editable: true,
        navLinks: true,
        eventResizableFromStart: true,

        headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "dayGridMonth,timeGridWeek,timeGridDay"
        },

        eventSources: [
            {
                url: "/appointments/events_json",
                method: "GET",
                color: "#0d6efd",
                textColor: "white"
            }
        ],

        dateClick: function(info) {
            window.location.href = `/appointments/new?date=${info.dateStr}`;
        },

        eventClick: function(info) {
            window.location.href = `/appointments/${info.event.id}/edit`;
        },

        eventDrop: function(info) {
            updateEvent(info);
        },

        eventResize: function(info) {
            updateEvent(info);
        }
    });

    calendar.render();

    function updateEvent(info) {
        fetch("/appointments/update_from_calendar", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                id: info.event.id,
                date: info.event.start.toISOString().slice(0,10),
                time: info.event.start.toISOString().slice(11,16)
            })
        });
    }
});
</script>
{% endblock %}

<div id="chat-widget" style="display:none;">

    <div id="chat-header">
        <span>Chat équipe</span>
        <button onclick="closeChatWidget()">×</button>
    </div>

    <div id="chat-messages"></div>

    <div id="chat-input-area">
        <button id="btn-file" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-paperclip"></i>
        </button>

        <textarea id="chat-input" placeholder="Écrire un message..."></textarea>

        <button id="btn-send" onclick="sendWidgetMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>

        <input type="file" id="file-input" style="display:none;" onchange="uploadChatFile()">
    </div>
</div>

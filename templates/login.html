{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}

<style>
    .login-card {
        max-width: 420px;
        margin: 60px auto;
        padding: 30px 35px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        animation: fadeIn .4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="login-card bg-white">

    <div class="text-center mb-4">
        <div class="mb-2">
            <i class="bi bi-shield-lock-fill" style="font-size:3rem; color:#1e1e2f;"></i>
        </div>
        <h2 class="fw-bold">Connexion</h2>
        <p class="text-muted">Accédez à votre espace</p>
    </div>

    <form method="post" class="row g-3">

        <div class="col-12">
            <label class="form-label fw-semibold">Utilisateur</label>
            <input type="text" name="username" class="form-control form-control-lg"
                   placeholder="Votre identifiant" required>
        </div>

        <div class="col-12">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   placeholder="••••••••" required>
        </div>

        <div class="col-12 mt-3">
            <button type="submit" class="btn btn-primary w-100 btn-lg">
                <i class="bi bi-box-arrow-in-right me-1"></i> Se connecter
            </button>
        </div>
    </form>

</div>

{% endblock %}

{% extends "base.html" %}
{% block title %}Rendez-vous{% endblock %}

{% block content %}

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fw-bold">

        {% if action == "new" %}
            <i class="bi bi-calendar-plus me-2"></i> Nouveau rendez-vous
        {% else %}
            <i class="bi bi-pencil-square me-2"></i> Modifier le rendez-vous
        {% endif %}
    </h1>

    <a href="{{ url_for('list_appointments') }}"
       class="btn btn-outline-secondary btn-lg">
        <i class="bi bi-arrow-left me-1"></i> Retour
    </a>
</div>


<!-- FORMULAIRE -->
<div class="card shadow-sm border-0">
    <div class="card-body">

        <form method="post" class="row g-4">

            <!-- TITRE -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Titre *</label>
                <input type="text" class="form-control" name="title" required
                       value="{{ rdv.title if rdv else '' }}">
            </div>

            <!-- CLIENT -->
            <div class="col-md-6">
                {% if client %}
                    <label class="form-label fw-semibold">Client</label>
                    <input type="text" class="form-control" disabled value="{{ client.name }}">
                    <input type="hidden" name="client_id" value="{{ client.id }}">
                {% else %}
                    <label class="form-label fw-semibold">Nom du client *</label>
                    <input type="text" class="form-control" name="client_name" required
                           value="{{ rdv.client_name if rdv else '' }}">
                {% endif %}
            </div>

            <!-- DATE -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Date *</label>
                <input type="date" class="form-control" name="date" required
                       value="{{ rdv.date.strftime('%Y-%m-%d') if rdv else '' }}">
            </div>

            <!-- HEURE -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Heure *</label>
                <input type="time" class="form-control" name="time" required
                       value="{{ rdv.time.strftime('%H:%M') if rdv else '' }}">
            </div>

            <!-- NOTES -->
            <div class="col-12">
                <label class="form-label fw-semibold">Notes</label>
                <textarea class="form-control" name="notes" rows="4">{{ rdv.notes if rdv else '' }}</textarea>
            </div>

            <!-- BOUTON -->
            <div class="col-12 text-end">
                <button class="btn btn-primary btn-lg" type="submit">
                    {% if action == "new" %}
                        <i class="bi bi-check-lg me-1"></i> Ajouter le rendez-vous
                    {% else %}
                        <i class="bi bi-save me-1"></i> Enregistrer les modifications
                    {% endif %}
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}

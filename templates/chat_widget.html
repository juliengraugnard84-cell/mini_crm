<!-- ================= CHAT BULLE FLOTTANTE ================= -->

<button
    id="chat-toggle"
    class="chat-toggle"
    type="button"
    aria-label="Ouvrir le chat"
    aria-haspopup="dialog"
    aria-expanded="false">

    <span class="chat-toggle-icon">💬</span>

    <span
        id="chat-badge"
        class="chat-badge"
        style="display:none;"
        aria-hidden="true">
        0
    </span>
</button>

<!-- Widget Chat -->
<div
    id="chat-widget"
    class="chat-widget"
    aria-hidden="true"
    role="dialog"
    aria-modal="false"
    aria-label="Chat interne">

    <!-- HEADER -->
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="chat-title">Chat interne</div>
            <div class="chat-subtitle">Support</div>
        </div>

        <button
            id="chat-close"
            class="chat-close"
            type="button"
            aria-label="Fermer le chat">
            ✕
        </button>
    </div>

    <!-- MESSAGES -->
    <div
        id="chat-messages"
        class="chat-messages"
        role="log"
        aria-live="off"
        aria-relevant="additions">
    </div>

    <!-- FORMULAIRE -->
    <form
        id="chat-form"
        class="chat-inputbar"
        enctype="multipart/form-data"
        autocomplete="off">

        <label class="chat-attach" title="Joindre un fichier">
            📎
            <input
                id="chat-file"
                name="file"
                type="file"
                tabindex="-1">
        </label>

        <textarea
            id="chat-input"
            name="message"
            class="chat-input"
            rows="1"
            placeholder="Écrire un message…"
            autocomplete="off">
        </textarea>

        <button
            class="chat-send"
            type="submit"
            aria-label="Envoyer le message">
            ➤
        </button>
    </form>
</div>

<!-- ================= AUDIO NOTIFICATION ================= -->

<audio id="chat-sound" preload="auto">
    <source src="{{ url_for('static', filename='sounds/notification.mp3') }}" type="audio/mpeg">
</audio>

<!-- ================= VARIABLES JS CHAT ================= -->

<script>
    window.CHAT_CURRENT_USER_ID = {{ (current_user.id if current_user else None) | tojson }};
    window.CHAT_CURRENT_USERNAME = {{ (current_user.username if current_user else None) | tojson }};
    window.CHAT_CSRF_TOKEN = {{ (csrf_token if csrf_token else None) | tojson }};
</script>

<!-- ================= SOUND LOGIC FINAL ================= -->

<script>

let lastMessageId = null;
let chatAudioUnlocked = false;
let lastSoundTimestamp = 0;

// 🔊 Lecture sécurisée avec anti-spam
function playNotificationSound() {
    const audio = document.getElementById("chat-sound");
    if (!audio || !chatAudioUnlocked) return;

    const now = Date.now();

    // Anti double déclenchement (important)
    if (now - lastSoundTimestamp < 1000) return;

    lastSoundTimestamp = now;

    audio.currentTime = 0;
    audio.play().catch(() => {});
}

// 🔓 Déblocage audio (clic + clavier)
function unlockChatAudio() {
    if (chatAudioUnlocked) return;

    const audio = document.getElementById("chat-sound");
    if (!audio) return;

    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        chatAudioUnlocked = true;
        console.log("🔓 Audio débloqué");
    }).catch(() => {});
}

document.addEventListener("click", unlockChatAudio);
document.addEventListener("keydown", unlockChatAudio);

//
// 🔔 1. HOOK FETCH (API)
//
(function () {

    const originalFetch = window.fetch;

    window.fetch = async function (...args) {

        const response = await originalFetch.apply(this, args);

        try {

            const url = args[0];

            if (typeof url === "string" && url.includes("/chat/messages")) {

                const clone = response.clone();
                const data = await clone.json();

                if (data && data.success && Array.isArray(data.messages)) {

                    const messages = data.messages;

                    if (messages.length > 0) {

                        const lastMsg = messages[messages.length - 1];

                        if (lastMessageId && lastMsg.id !== lastMessageId) {

                            if (lastMsg.sender_id !== window.CHAT_CURRENT_USER_ID) {
                                console.log("🔔 Nouveau message (API)");
                                playNotificationSound();
                            }
                        }

                        lastMessageId = lastMsg.id;
                    }
                }
            }

        } catch (e) {
            console.warn("Chat sound hook error:", e);
        }

        return response;
    };

})();

//
// 🔔 2. FALLBACK DOM (ULTRA FIABLE)
//
(function () {

    const chatContainer = document.getElementById("chat-messages");
    if (!chatContainer) return;

    const observer = new MutationObserver((mutations) => {

        mutations.forEach((mutation) => {

            mutation.addedNodes.forEach((node) => {

                if (
                    node.classList &&
                    node.classList.contains("chat-row") &&
                    node.classList.contains("them")
                ) {
                    console.log("🔔 Nouveau message (DOM)");
                    playNotificationSound();
                }

            });

        });

    });

    observer.observe(chatContainer, {
        childList: true
    });

})();

</script>
